version: '3.9'

# ──────────────────────────────────────────────────────────────────────────────
# KAVACH AI — Docker Compose (local development / staging)
#
# For production, supply a .env file (copy .env.example) with real values:
#   DB_PASSWORD, JWT_SECRET, GEMINI_API_KEY, R2_*, RAZORPAY_*, etc.
#
# NEVER use the default fallbacks in production.
# ──────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kavach_db
      POSTGRES_USER: ${DB_USER:-kavach}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kavach123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kavach} -d kavach_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kavach_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-kavach}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-kavach123}
      # JWT — MUST override in production with a strong 32-char+ secret
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-min-32-chars!!}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-900000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      # CORS — set to your production frontend URL
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # AI — optional, leave blank to disable
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Cloudflare R2 storage for screenshots
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-kavach-screenshots}
      # Razorpay — use rzp_test_ keys for dev, rzp_live_ for production
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

  web-app:
    build:
      context: .
      dockerfile: ./apps/web-app/Dockerfile
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8080}
      # MUST be "false" in production — only enable in dev/staging for demos
      NEXT_PUBLIC_SHOW_DEMO_CREDENTIALS: ${NEXT_PUBLIC_SHOW_DEMO_CREDENTIALS:-false}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
