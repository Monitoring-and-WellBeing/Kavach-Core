version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kavach_db
      POSTGRES_USER: ${DB_USER:-kavach}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kavach123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavach -d kavach_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kavach_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-kavach}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-kavach123}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-min-32-chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

  web-app:
    build:
      context: .
      dockerfile: ./apps/web-app/Dockerfile
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
