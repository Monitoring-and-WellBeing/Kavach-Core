name: KAVACH Desktop Agent — Build & Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push a tag like  desktop-agent-v1.2.4  to kick off a Windows build
#   • Workflow dispatch for manual one-off builds
# Output:
#   • A GitHub Release (draft) containing KAVACH-Agent-Setup-<version>.exe
#   • The release stays as DRAFT until you manually publish it on GitHub
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "desktop-agent-v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release?"
        required: false
        default: "true"

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node + pnpm ───────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install monorepo dependencies
        run: pnpm install

      # ── 4. Generate build-time config (injects API_URL from repo secret) ────────
      # API_URL must be set as a GitHub repository secret:
      #   GitHub → repo → Settings → Secrets → Actions → New secret
      #   Name: KAVACH_API_URL   Value: https://kavach-core-production.up.railway.app
      #
      # This step writes src/buildTime.ts with the real URL.
      # The URL never appears in committed source code.
      - name: Generate build-time config
        run: pnpm write-config
        working-directory: apps/desktop-agent
        env:
          API_URL: ${{ secrets.KAVACH_API_URL }}

      # ── 5. Compile TypeScript ─────────────────────────────────────────────────
      - name: Compile TypeScript
        run: pnpm build
        working-directory: apps/desktop-agent

      # ── 6. Build Windows NSIS installer ──────────────────────────────────────
      # electron-builder reads GH_TOKEN to create/upload the GitHub Release.
      # The token is automatically provided by GitHub Actions.
      - name: Build Windows installer
        run: pnpm electron-builder --win --x64 --publish always
        working-directory: apps/desktop-agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Upload artifact as workflow artifact (backup) ──────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop-agent/dist-build/*.exe
          retention-days: 30
