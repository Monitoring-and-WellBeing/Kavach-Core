# Use H2 in-memory for tests — no real DB needed
spring.datasource.url=jdbc:h2:mem:kavach_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# JWT config for tests
kavach.jwt.secret=test-jwt-secret-key-that-is-long-enough-for-hs256-algorithm-requirement
kavach.jwt.expiration=86400000
kavach.jwt.refresh-token-expiry=604800000

# Disable external services in tests
razorpay.key.id=rzp_test_xxx
razorpay.key.secret=test_secret
razorpay.webhook.secret=test_webhook
