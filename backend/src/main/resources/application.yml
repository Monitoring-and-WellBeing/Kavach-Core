spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-silent-rice-a1yu2php-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
    # WARNING: SPRING_DATASOURCE_USERNAME and SPRING_DATASOURCE_PASSWORD MUST be set
    # via environment variables in production. The fallback values below are for local
    # development only and must NEVER be committed or used in production.
    username: ${SPRING_DATASOURCE_USERNAME:neondb_owner}
    password: ${SPRING_DATASOURCE_PASSWORD:CHANGE_ME_IN_PROD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: KavachHikariPool
      # Sized for Neon pooler (PgBouncer in transaction mode).
      # Formula: (core_count × 2) + 1; Railway Starter = 1 vCPU → 3 minimum.
      # Set to 10 to handle burst traffic while staying within Neon's connection limit.
      # Raise to 20 when upgrading to Neon Pro (which lifts the connection cap).
      maximum-pool-size: 10
      minimum-idle: 2
      # Fail fast if DB is unreachable at startup — better than queuing forever.
      connection-timeout: 20000
      # Release idle connections after 3 min to avoid holding Neon slots during quiet periods.
      idle-timeout: 180000
      # Recycle connections before Neon's server-side 5-min idle timeout kills them.
      max-lifetime: 240000
      # Send keepalive every 60s so Neon doesn't suspend the compute during low traffic.
      keepalive-time: 60000
      # Validate connection health before handing it to the application.
      connection-test-query: SELECT 1
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false
    validate-on-migrate: true
    # Flyway uses spring.datasource credentials by default.
    # Do NOT set separate flyway.url / flyway.user / flyway.password here.
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379} # GAP-1 FIXED

  security:
    cors:
      # CORS_ORIGINS must be set in Railway/Vercel in production; localhost fallback is dev-only.
      # Format: comma-separated list, e.g. https://kavach.vercel.app,http://localhost:3000
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

server:
  port: ${PORT:8080}

kavach:
  jwt:
    # WARNING: JWT_SECRET MUST be overridden in production with a strong 256-bit+ secret.
    # The fallback below is for local development only.
    secret: ${JWT_SECRET:kavach-jwt-secret-key-minimum-256-bits-long-change-in-production-2024}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}        # 15 minutes in ms
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}    # 7 days in ms
  ai:
    provider: gemini
    gemini:
      # GEMINI_API_KEY must be set in production; no fallback is intentional
      api-key: ${GEMINI_API_KEY:}
      model: gemini-1.5-flash

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: alpha
    tagsSorter: alpha

logging:
  level:
    com.kavach: DEBUG
    org.springframework.security: INFO

r2:
  account-id: ${R2_ACCOUNT_ID:}
  access-key-id: ${R2_ACCESS_KEY:} # GAP-15 FIXED
  secret-access-key: ${R2_SECRET_ACCESS_KEY:}
  bucket-name: ${R2_BUCKET_NAME:}

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:} # GAP-15 FIXED
    secret: ${RAZORPAY_KEY_SECRET:} # GAP-15 FIXED
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
# GAP-14 FIXED
