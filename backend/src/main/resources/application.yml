spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kavach_db}
    username: ${SPRING_DATASOURCE_USERNAME:kavach}
    password: ${SPRING_DATASOURCE_PASSWORD:kavach123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

kavach:
  jwt:
    secret: ${JWT_SECRET:kavach-super-secret-key-change-in-production-2024-must-be-at-least-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

logging:
  level:
    com.kavach: DEBUG
    org.springframework.security: INFO
