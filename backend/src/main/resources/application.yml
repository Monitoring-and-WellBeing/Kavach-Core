spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kavach_db}
    username: ${SPRING_DATASOURCE_USERNAME:kavach}
    password: ${SPRING_DATASOURCE_PASSWORD:kavach123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

kavach:
  jwt:
    secret: ${JWT_SECRET:kavach-jwt-secret-key-minimum-256-bits-long-change-in-production-2024}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900000}        # 15 minutes in ms
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}    # 7 days in ms

spring:
  security:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

logging:
  level:
    com.kavach: DEBUG
    org.springframework.security: INFO

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}
