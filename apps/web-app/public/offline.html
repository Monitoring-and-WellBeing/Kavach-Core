<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAVACH AI — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F172A;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 900; color: white;
      margin-bottom: 24px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { color: #94A3B8; font-size: 14px; line-height: 1.6; max-width: 280px; }
    .badge {
      margin-top: 24px;
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: #64748B;
    }
    button {
      margin-top: 20px;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">K</div>
  <h1>You're offline</h1>
  <p>Check your internet connection. Your last dashboard data is still available in the app.</p>
  <div class="badge">📊 Cached data is available</div>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
