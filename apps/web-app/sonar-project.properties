sonar.projectKey=kavach-ai_web-app
sonar.projectName=KAVACH AI Web App
sonar.organization=YOUR_SONAR_ORG

sonar.sources=src
sonar.exclusions=**/__tests__/**,**/node_modules/**,**/.next/**,**/e2e/**
